<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/CssLogin.css">
    <title>Login</title>
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <h1>Login</h1>
        </div>

        <form id="loginForm" action="/login" method="POST">
            <div class="input-box">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="input-field" placeholder="Username" autocomplete="off" required>
            </div>
        
            <div class="input-box">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="input-field" placeholder="Password" autocomplete="off" required>
            </div>
        
            <!-- <div class="forgot">
                <section>
                    <input type="checkbox" id="check" name="rememberMe">
                    <label for="check">Remember Me</label>
                </section>
                <section>
                    <a href="/Forgot.html">Forgot Password</a>
                </section>
            </div> -->
        
            <div class="input-submit">
                <button type="submit" class="submit-btn" id="signInButton">Sign In</button>
            </div>
        
            <div class="sign-up-link">
                <p>Don't have an account? <a href="/Register.html">Sign Up</a></p>
            </div>
        </form>
        
    </div>

    <script>
        async function loginUser(event) {
          event.preventDefault(); // ป้องกันการรีเฟรชหน้าเว็บ
      
          const username = document.getElementById('username').value;
          const password = document.getElementById('password').value;
      
          const response = await fetch('/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username, password }),
          });
      
          const data = await response.json();
          if (response.status === 200) {
            // ล็อกอินสำเร็จ, เปลี่ยนเส้นทางไปยังหน้าแดชบอร์ด
            window.location.href = '/Project.html';  // เปลี่ยนเส้นทางไปที่แดชบอร์ด
          } else {
            // แสดงข้อผิดพลาดหากล็อกอินไม่สำเร็จ
            alert(data.message);  // แสดงข้อความข้อผิดพลาด
          }
        }
      
        document.getElementById('loginForm').addEventListener('submit', loginUser);
      </script>
      
    
</body>
</html>
